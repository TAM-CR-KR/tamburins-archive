const tabsEl=document.getElementById('tabs');
const panelsEl=document.getElementById('panels');

accords.forEach((ac,i)=>{
  const t=document.createElement('button');
  t.className='tab'+(i===0?' on':'');
  t.textContent=ac.en;
  if(i===0){t.style.background=ac.tc.bg;t.style.borderColor=ac.tc.border;t.style.color=ac.tc.text;}
  t.onclick=()=>{
    document.querySelectorAll('.tab').forEach(x=>{x.classList.remove('on');x.style.background='';x.style.borderColor='';x.style.color='';});
    t.classList.add('on');t.style.background=ac.tc.bg;t.style.borderColor=ac.tc.border;t.style.color=ac.tc.text;
    document.querySelectorAll('.panel').forEach(x=>x.classList.remove('on'));
    document.getElementById('p-'+ac.id).classList.add('on');
  };
  tabsEl.appendChild(t);

  const p=document.createElement('div');
  p.className='panel'+(i===0?' on':'');
  p.id='p-'+ac.id;

  const ingrHtml=ac.ingrChips.map(c=>`<span class="ingr-chip" style="background:${ac.hc.bg};color:${ac.tc.text};border-color:${ac.hc.border}">${c}</span>`).join('');

  const pfHtml=ac.perfumes.map((pf,pi)=>{
    const bid=`b-${ac.id}-${pi}`;
    const chipsHtml=pf.tags.map(t=>chip(t)).join('');
    const notesHtml=pf.notes.map(n=>`
      <div class="note-card" style="background:${n.bg}">
        <div class="note-pos" style="color:${ac.tc.text}">${n.pos} Note</div>
        <div class="note-name" style="color:${ac.tc.text}">${n.name}</div>
        <div class="note-everyday">${n.everyday}</div>
      </div>`).join('');
    const wHtml=pf.wordings.map(w=>`
      <div class="wording-block" style="border-left-color:${ac.tc.border}">
        <button class="copy-btn" onclick="cp(this,'${w.text.replace(/'/g,"\\'")}')">복사</button>
        <div class="wording-label" style="color:${ac.tc.text}">${w.label}</div>
        <div class="wording-text">"${w.text}"</div>
        <div class="wording-note">${w.note}</div>
      </div>`).join('');
    return `<div class="pf-card">
      <div class="pf-card-head" onclick="tog('${bid}',this)">
        <div class="pf-chips">${chipsHtml}</div>
        <div class="pf-name">${pf.name} <span style="font-size:11px;color:#999;font-weight:400">${pf.year}</span></div>
        <div class="pf-arrow">▼</div>
      </div>
      <div class="pf-body" id="${bid}">
        <div class="sec-label" style="margin-bottom:8px">향료 × 일상 연결</div>
        <div class="note-grid">${notesHtml}</div>
        <div class="sec-label" style="margin-bottom:8px">응대 워딩</div>
        ${wHtml}
        <div class="expert-tip"><div class="expert-tip-label">Expert Tip</div>${pf.tip}</div>
      </div>
    </div>`;
  }).join('');

  p.innerHTML=`
    <div class="ac-head" style="background:${ac.hc.bg};border:1px solid ${ac.hc.border};border-bottom:none;border-radius:12px 12px 0 0">
      <div class="ac-en" style="color:${ac.hc.desc}">${ac.en}</div>
      <div class="ac-kr" style="color:${ac.tc.text}">${ac.kr}</div>
      <div class="ac-desc" style="color:${ac.hc.desc}">${ac.desc}</div>
    </div>
    <div class="ac-body">
      <div class="sec"><div class="sec-label">계열 주요 향료</div><div class="ingr-chips">${ingrHtml}</div></div>
      <div class="sec"><div class="sec-label" style="margin-bottom:12px">향수별 향료 × 일상 연결 & 응대 워딩</div><div class="pf-list">${pfHtml}</div></div>
    </div>`;
  panelsEl.appendChild(p);
});

function tog(id,h){
  const b=document.getElementById(id);
  const a=h.querySelector('.pf-arrow');
  const open=b.classList.contains('open');
  b.classList.toggle('open',!open);
  h.classList.toggle('open',!open);
  a.classList.toggle('open',!open);
}
function cp(btn,text){
  navigator.clipboard.writeText(text).then(()=>{btn.textContent='복사됨';setTimeout(()=>btn.textContent='복사',1500);});
}
</script>
