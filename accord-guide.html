*{box-sizing:border-box;margin:0;padding:0}
:root{--sans:'Apple SD Gothic Neo','AppleSDGothicNeo','Malgun Gothic',-apple-system,sans-serif;--ink:#2b2824;--muted:#8a8177;--line:#e7e0d4;--bg:#ffffff;}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;}
.ttl{font-family:'TITLEFONT',serif;text-transform:uppercase;letter-spacing:.04em;}
.bar{display:flex;gap:8px;align-items:center;justify-content:flex-end;padding:10px 16px;border-bottom:1px solid var(--line);}
.btn{font-family:var(--sans);font-size:12.5px;cursor:pointer;border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:999px;padding:7px 14px;}
.btn.dark{background:var(--ink);color:#fff;border-color:var(--ink);}
.hero{text-align:center;padding:28px 20px 2px;}
.hero h1{font-size:23px;letter-spacing:.05em;}
.hero p{margin-top:7px;color:var(--muted);font-size:12.5px;}
.tabs{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;padding:14px 14px 4px;}
.tab{font-family:var(--sans);font-size:13px;cursor:pointer;border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:999px;padding:8px 15px;}
.wrap{max-width:1000px;margin:0 auto;padding:12px 16px 44px;}
.adesc{border-radius:14px;padding:15px 18px;margin:6px 0 14px;font-size:13px;line-height:1.7;}
.plist{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px;}
.pf{cursor:pointer;border:1px solid var(--line);background:#fff;border-radius:999px;padding:8px 15px;font-size:13px;}
.pf.on{color:#fff;}
.detail{border:1px solid var(--line);border-radius:16px;background:#fff;padding:20px 20px;margin-top:6px;}
.detail h2{font-size:20px;}
.detail .sub{font-size:12.5px;color:#5b5149;margin-top:5px;line-height:1.6;}
.dsec{margin-top:18px;}
.dsec h3{font-size:11.5px;letter-spacing:.06em;color:var(--muted);margin-bottom:9px;}
.chips{display:flex;flex-wrap:wrap;gap:6px;}
.chip{background:#efe9df;border:1px solid var(--line);border-radius:999px;padding:5px 12px;font-size:12px;}
.chip.kw{background:#f3eef6;border-color:#e3d7ec;}
.word{border:1px solid var(--line);border-radius:12px;padding:13px 15px;margin-bottom:9px;background:#fbfaf7;}
.word .wl{font-size:11px;font-weight:700;color:#8a6d4a;margin-bottom:5px;}
.word .wt{font-size:13px;line-height:1.7;}
.word .wn{font-size:11.5px;color:var(--muted);margin-top:7px;}
.note{display:grid;grid-template-columns:64px 1fr;gap:10px;border:1px solid var(--line);border-radius:12px;padding:11px 14px;margin-bottom:8px;background:#fff;align-items:start;}
.note .np{font-size:10px;font-weight:700;color:#fff;background:#b7a892;border-radius:6px;padding:3px 0;text-align:center;}
.note .nm{font-weight:700;font-size:12.5px;}
.note .ne{font-size:12px;color:#5b5149;line-height:1.6;margin-top:3px;}
.tip{border-radius:12px;padding:12px 15px;font-size:12.5px;line-height:1.65;background:#eef4e6;border:1px solid #d3e3bd;margin-top:8px;}
.tip b{display:block;font-size:11px;margin-bottom:4px;}
.gbox{border:1px dashed var(--line);border-radius:16px;padding:16px 18px;margin-top:18px;background:#fcfbf8;}
.gbox>.gt{font-family:'TITLEFONT',serif;text-transform:uppercase;font-size:11px;letter-spacing:.1em;color:var(--muted);margin-bottom:10px;}
.acard{border:1px solid var(--line);border-radius:12px;padding:13px 15px;background:#fff;margin-bottom:9px;}
.acard .at{font-weight:700;font-size:13px;margin-bottom:5px;}
.acard .ax{font-size:12.5px;line-height:1.65;color:#5b5149;}
.script{border:1px solid var(--line);border-radius:12px;padding:12px 15px;background:#fff;margin-bottom:8px;}
.script .who{font-size:11px;font-weight:700;margin-bottom:4px;}
.script .line{font-size:12.5px;line-height:1.65;}
.script .snote{font-size:11.5px;color:var(--muted);margin-top:6px;}
.us{display:flex;gap:8px;align-items:flex-start;font-size:12.5px;line-height:1.6;margin-bottom:6px;}

<script>
let GDATA=[{"id": "floral", "en": "Floral", "kr": "플로럴 — 꽃의 다양한 결", "c": {"bg": "#FBEAF0", "bd": "#F4C0D1", "tx": "#72243E", "ds": "#993556", "tabtx": "#72243E"}, "desc": "탬버린즈 플로럴은 화사하고 풍성한 꽃향이 아닌 절제되고 투명한 플로럴입니다. LALE의 그린-플로럴, EVENING GLOW의 따뜻한 플로럴, SUNSHINE의 복합 플로럴, SUMMER TAILS의 산뜻한 플로럴까지 각각 전혀 다른 결을 갖습니다.", "perfumes": [{"name": "LALE", "base": "LALE", "sub": "그린+플로럴 — 튤립 기반, 물기 있고 투명한 플로럴. 파우더리하지 않음", "respond": [{"label": "장면 워딩", "text": "봄비가 내린 다음 날, 튤립밭 사이를 걷는 것 같은 향이에요. 화려하지 않고 투명한데, 가까이 오면 비로소 느껴지는 꽃의 공기예요.", "note": "→ 베르가못 탑 + 튤립 하트를 '봄비 다음 날 공기'로 통합"}, {"label": "전문 고객 워딩", "text": "탑에서 베르가못이 그린하게 열리고, 하트 노트로 튤립이 들어오는데 파우더리하지 않고 수분감 있는 플로럴이에요. 베이스의 화이트 머스크가 건조하지 않게 잡아줘서 드라이다운이 굉장히 부드럽게 이어져요.", "note": "→ 노트 구조 + 드라이다운 특성을 전문 용어로 설명"}], "plus": {"notes": [{"pos": "Top", "name": "베르가못", "everyday": "얼그레이 티를 따를 때 올라오는 싱그럽고 감귤 같은 향"}, {"pos": "Heart", "name": "튤립", "everyday": "이른 봄 꽃집 앞을 지나칠 때 순간적으로 코 끝에 오는 투명한 꽃향"}, {"pos": "Base", "name": "화이트 머스크", "everyday": "방금 세탁해 햇살에 말린 린넨 시트의 보송하고 깨끗한 잔향"}], "tip": "시향 시 '바로 판단하지 말고 10분 뒤 다시 맡아보세요' — 베르가못 탑이 걷힌 후 튤립의 투명한 플로럴이 진짜 얼굴입니다."}}, {"name": "EVENING GLOW", "base": "EVENING GLOW", "sub": "플로럴+머스크 — 노을빛 같은 따뜻하고 부드러운 플로럴", "respond": [{"label": "장면 워딩", "text": "노을이 지는 시간, 창가에 놓인 꽃병에서 따뜻한 바람이 불어오는 것 같아요. 처음엔 화사하게 피어오르다가 시간이 지나면 피부에 스며들듯 따뜻하고 포근하게 변해요.", "note": "→ 이름(Evening Glow)의 의미를 향의 드라이다운 변화와 직접 연결"}, {"label": "전문 고객 워딩", "text": "피오니가 플로럴 하트를 열고, 로즈 우드가 꽃향에 우디한 따뜻함을 더해요. 베이스로 내려오면서 샌달우드 머스크가 피부에 완전히 밀착되는데, 이 드라이다운이 이 향의 하이라이트예요.", "note": "→ 피오니·로즈우드 향료명 + 드라이다운 하이라이트 표현"}], "plus": {"notes": [{"pos": "Top", "name": "피오니", "everyday": "결혼식장 테이블 위 생화에서 나는 달콤하고 화사한 향"}, {"pos": "Heart", "name": "로즈 우드", "everyday": "오래된 나무 가구 위에 장미 꽃잎 한 장을 올려둔 것 같은 따뜻한 플로럴"}, {"pos": "Base", "name": "샌달우드 머스크", "everyday": "샤워 직후 몸에 바른 크리미한 바디로션의 보송하고 따뜻한 잔향"}], "tip": "'이 향은 뿌린 직후보다 한 시간 뒤가 훨씬 예뻐요' — 고객에게 기대감을 심어주는 핵심 멘트."}}, {"name": "SUNSHINE", "base": "SUNSHINE", "sub": "플로럴+우디+머스크 — 햇살 아래 피어나는 복합 플로럴, 우디 베이스로 지속력 ↑", "respond": [{"label": "장면 워딩", "text": "햇살이 피부에 닿아 따뜻해진 것 같은 향이에요. 꽃향인데 가볍게 날아가지 않고 시더우드 베이스가 받쳐줘서 오후 내내 피부 위에 머물러요.", "note": "→ 이름(Sunshine)의 온기를 우디 지속력과 연결"}, {"label": "전문 고객 워딩", "text": "탑의 네롤리가 시트러스-플로럴 경계에서 싱그럽게 열리고, 화이트 플로럴 하트를 지나 시더우드 머스크 베이스로 이어지는 구조예요. 세 계열이 레이어드되면서 지속력이 플로럴 중 가장 긴 편이에요.", "note": "→ 네롤리 향료명 + 세 계열 레이어 구조를 전문적으로 설명"}], "plus": {"notes": [{"pos": "Top", "name": "네롤리", "everyday": "귤 껍질을 손으로 비볐을 때 손가락에 남는 싱그럽고 달콤한 향"}, {"pos": "Heart", "name": "화이트 플로럴", "everyday": "한낮 햇살 아래 활짝 핀 흰 꽃이 공기 중에 녹아드는 느낌"}, {"pos": "Base", "name": "시더우드 머스크", "everyday": "오래된 연필을 깎고 나서 손에 남는 건조하고 따뜻한 나무 잔향"}], "tip": "네롤리를 모르는 고객에게는 '귤 껍질 비볐을 때 그 향 아세요?'로 먼저 감각을 열어주세요."}}, {"name": "SUMMER TAILS", "base": "SUMMER TAILS", "sub": "그린+플로럴 — 여름 끝 산뜻하고 시원한 플로럴", "respond": [{"label": "장면 워딩", "text": "여름이 끝나가는 8월 저녁, 풀밭 위로 바람이 부는 것 같아요. 꽃향인데 달콤하지 않고 풀기운이 섞여서 꾸밈없이 산뜻해요.", "note": "→ 이름(Summer Tails)의 '여름의 끝' 감각을 그린+플로럴로 구체화"}, {"label": "전문 고객 워딩", "text": "그린 리프 탑이 플로럴 계열인데도 식물성 날 것의 감각으로 시작해요. 프리지아가 하트에서 청초하게 올라오면서 달콤하지 않은 플로럴을 만들고, 화이트 머스크 베이스가 가장 가볍게 마무리해요.", "note": "→ 그린 리프·프리지아 향료명으로 '달콤하지 않은 플로럴'의 구조 설명"}], "plus": {"notes": [{"pos": "Top", "name": "그린 리프", "everyday": "풀밭 한가운데서 풀잎을 손으로 뜯었을 때 나는 싱그러운 풋내"}, {"pos": "Heart", "name": "프리지아", "everyday": "꽃집 냉장고 문을 열었을 때 가장 먼저 오는 가볍고 청초한 꽃향"}, {"pos": "Base", "name": "화이트 머스크", "everyday": "새 면 티셔츠에서 나는 깨끗하고 보송한 향"}], "tip": "'프리지아는 꽃향인데 설탕 같지 않아요, 이게 SUMMER TAILS가 다른 이유예요' — 플로럴인데 달콤함이 없는 이유를 프리지아로 설명."}}], "approach": [{"title": "취향 세분화 질문", "text": "'꽃향 좋아하세요?'에서 더 나아가 — '화사하고 풍성한 플로럴인지, 아니면 물기 있고 투명한 쪽인지, 따뜻하게 감기는 플로럴인지' 방향을 좁혀가기."}, {"title": "감각 표현법", "text": "'봄날 꽃다발'보다 '이슬이 맺힌 튤립 한 송이', '노을 질 무렵 창가에 놓인 꽃병'처럼 장면과 빛으로 묘사."}], "scripts": [{"who": "고객", "line": "꽃향 좋아하는데 너무 달콤하거나 진하지 않은 거 찾아요."}, {"who": "직원", "line": "그러시면 LALE가 정말 잘 맞으실 것 같아요. 탬버린즈 플로럴 중에서 가장 투명하고 물기 있는 타입인데요, 튤립에서 영감을 받아서 달콤하거나 파우더리하지 않고 그린이 섞인 맑은 플로럴이에요. 비교해서 EVENING GLOW도 맡아보시면 좋은데, 이건 좀 더 따뜻하게 감기는 플로럴이에요.", "note": "→ 고객의 부정어(달콤하지 않은, 진하지 않은)를 정확히 LALE에 연결"}, {"who": "직원 (연계)", "line": "SUNSHINE은 플로럴이면서 우디 베이스가 있어서 지속력이 더 긴 편이에요. 오래 지속되는 플로럴을 원하신다면 이쪽도 한번 비교해보시겠어요?", "note": "→ 지속력 니즈가 있을 때 SUNSHINE으로 자연스러운 확장"}], "upsell": ["LALE → 같은 그린-플로럴 계열 핸드크림으로 레이어링 제안", "EVENING GLOW → 선물용 패키지 추천 자연스럽게 연결"], "caution": {"no": "'가장 여성스러운 향이에요'", "yes": "'섬세하고 절제된 분위기를 좋아하시는 분들한테 반응이 좋아요'"}}, {"id": "herbal", "en": "Herbal · Green · Mossy", "kr": "허벌/그린/모시 — 자연의 날 것", "c": {"bg": "#EAF3DE", "bd": "#C0DD97", "tx": "#3B6D11", "ds": "#639922", "tabtx": "#3B6D11"}, "desc": "Herbal(CHAMO, PUPPY), Green(LALE, LATE AUTUMN, SUMMER TAILS), Mossy(BATER IN THE LAKE)로 세분화됩니다. 허브의 자극적인 날 것, 풀밭의 청초함, 물가 이끼의 습윤함으로 각각 다른 자연의 감각입니다.", "perfumes": [{"name": "CHAMO", "base": "CHAMO", "sub": "허벌+머스크 — 카모마일 허브가 베이스, 따뜻하고 자연스러운 허벌 스킨향", "respond": [{"label": "장면 워딩", "text": "자기 전 캐모마일 티를 한 잔 마시는 것 같은 향이에요. 허브인데 날카롭지 않고 따뜻하게 감기면서 피부에 스며들어요. 아무것도 뿌리지 않은 것 같은데 은은하게 좋은 향이에요.", "note": "→ 카모마일 허브를 '자기 전 티 한 잔'이라는 일상 장면으로 전환"}, {"label": "전문 고객 워딩", "text": "베르가못 탑이 시트러스-허벌 경계에서 깔끔하게 열리고, 카모마일이 하트에서 허브의 따뜻함을 만들어요. 화이트 머스크 베이스가 허벌 계열의 자극을 부드럽게 마무리해서, 허브인데 피부 스킨향처럼 밀착돼요.", "note": "→ 카모마일+머스크 결합 구조를 '자극→부드러운 마무리'로 설명"}], "plus": {"notes": [{"pos": "Top", "name": "베르가못", "everyday": "얼그레이 티백을 뜯을 때 올라오는 싱그럽고 감귤 같은 향"}, {"pos": "Heart", "name": "카모마일", "everyday": "자기 전 마시는 캐모마일 티의 따뜻하고 포근한 허브 향"}, {"pos": "Base", "name": "화이트 머스크", "everyday": "막 씻고 나온 피부 위에 가볍게 바른 무향 로션의 보송하고 따뜻한 잔향"}], "tip": "'카모마일 티 아세요? 그 향과 피부 온기가 섞인 느낌이에요'로 시작하면 고객이 훨씬 빠르게 향을 상상합니다."}}, {"name": "LATE AUTUMN", "base": "LATE AUTUMN", "sub": "그린+머스크 — 가을 숲 바닥의 건조한 그린, 드라이하고 잔잔한", "respond": [{"label": "장면 워딩", "text": "가을 숲 바닥을 밟는 느낌이에요. 낙엽이 쌓인 건조하고 차분한 그린인데, 시간이 지나면 캐시미어 같은 머스크로 피부에 부드럽게 안착해요.", "note": "→ 베티버의 흙내+시더 리프의 건조함을 '가을 숲 바닥'으로 통합"}, {"label": "전문 고객 워딩", "text": "베티버가 탑에서 어시(earthy)한 그린으로 시작해요. 시더 리프가 하트에서 드라이하고 각진 그린을 더하고, 앰브레트 머스크가 베이스에서 식물성 머스크 특유의 포근하고 따뜻한 잔향을 만들어요. 앰브레트는 식물성 머스크라 동물성 향료 거부감 있는 분들도 편하게 즐기실 수 있어요.", "note": "→ 베티버·앰브레트 전문 향료명 + 식 : "냉장고에서 꺼낸 블랙커런트 잼 뚜껑을 열었을 때 올라오는 싱그럽고 과즙 가득한 향"}, {"pos": "Heart", "name": "무화과 밀크", "everyday": "잘 익은 무화과를 반으로 갈랐을 때 흘러나오는 달콤하고 크리미한 과즙"}, {"pos": "Base", "name": "클린 머스크", "everyday": "갓 씻은 피부에 가볍게 바른 무향 모이스처라이저의 포근하고 촉촉한 잔향"}], "tip": "'락토닉'은 우유나 크림의 크리미함을 표현하는 향수 용어 — 전문 고객에게 쓰면 바로 신뢰를 얻는 단어입니다."}}, {"name": "WHITE DARJEELING", "base": "WHITE DARJEELING", "sub": "프루티+티 — 홍차가 프루티를 감싸는 클린하고 세련된 구조", "respond": [{"label": "장면 워딩", "text": "오후 3시 창가에서 마시는 다르질링 한 잔 같은 향이에요. 시작은 얼그레이처럼 청명한데, 시간이 지나면서 복숭아 잼 같은 달콤함이 올라와요. 차를 다 마시고 나서도 따뜻하게 남는 찻잔의 향이에요.", "note": "→ 탑(얼그레이 시트러스) → 베이스(피치 머스크)의 흐름을 '티 타임 경험'으로 통합"}, {"label": "전문 고객 워딩", "text": "베르가못 탑이 시트러스-플로럴 경계에서 티의 첫 인상을 만들고, 다르질링 하트에서 홍차 특유의 아스트린전트(astringent)하고 그린한 결이 달콤함을 절제해요. 베이스의 피치 머스크에서 과일의 달콤함이 섬세하게 올라오는 구조예요.", "note": "→ 아스트린전트(astringent·수렴성) 전문 용어로 홍차의 그린하고 떫은 특성 설명"}], "plus": {"notes": [{"pos": "Top", "name": "베르가못", "everyday": "얼그레이 티를 처음 한 모금 마실 때 입에서 올라오는 싱그럽고 시트러스한 향"}, {"pos": "Heart", "name": "다르질링 홍차", "everyday": "오후 3시, 고급 호텔 라운지에서 마시는 다르질링 티의 섬세하고 풀내 나는 홍차 향"}, {"pos": "Base", "name": "피치 머스크", "everyday": "복숭아 과즙이 손가락에 묻고, 물로 씻은 후에도 손에 남아있는 달콤한 과일 잔향"}], "tip": "'아스트린전트'는 홍차나 타닌 계열의 약간 떫고 수렴하는 느낌 — '홍차의 떫은 그 느낌 아세요?'로 쉽게 풀어도 좋습니다."}}], "approach": [{"title": "취향 세분화 질문", "text": "'달콤한 향 좋아하세요?'에서 더 나아가 — '과즙이 터지는 신선한 달콤함인지, 무화과처럼 포근한 달콤함인지, 홍차처럼 클린한 달콤함인지' 방향 좁히기."}, {"title": "감각 표현법", "text": "'과일향이에요'가 아니라 '냉장고에서 꺼낸 복숭아의 서늘하고 달콤한 향기', '오후에 마시는 얼그레이 한 잔의 여운'처럼 일상 장면으로."}], "scripts": [{"who": "고객", "line": "달달하면서도 너무 무겁지 않은 향 있을까요?"}, {"who": "직원", "line": "두 가지를 비교해보시면 좋을 것 같아요. WHITE DARJEELING은 프루티한데 홍차 베이스가 있어서 달콤하면서도 굉장히 클린하게 느껴지거든요. 무겁지 않은 달콤함을 원하시면 이게 딱 맞을 것 같고요. PUMKINI는 좀 더 포근하고 따뜻하게 감기는 달콤함이에요. 어떤 게 더 당기시나요?", "note": "→ 두 프루티의 결 차이(클린 vs 포근)를 명확히 대비"}, {"who": "직원 (WHITE DARJEELING 시향 후)", "line": "이게 처음엔 홍차가 먼저 오다가 뒤로 갈수록 과일의 달콤함이 올라와요. 반대로 시작이 달콤하고 뒤가 차분한 타입이에요.", "note": "→ 드라이다운 역순 구조 설명으로 차별화 포인트 전달"}], "upsell": ["WHITE DARJEELING → 홍차 계열 좋아하는 고객에게 핸드크림 연결", "PUMKINI → Egg 시리즈 바디로션으로 달콤한 레이어링 제안"], "caution": {"no": "'여성분들이 좋아하는 달콤한 향이에요'", "yes": "'달콤하면서도 취향에 따라 클린하게도 포근하게도 즐길 수 있는 계열이에요'"}}, {"id": "woody", "en": "Woody", "kr": "우디/발사믹/앰버 — 깊고 단단한 무게감", "c": {"bg": "#F1EFE8", "bd": "#D3D1C7", "tx": "#444441", "ds": "#5F5E5A", "tabtx": "#444441"}, "desc": "Woody(BERGA SANDAL, UNKNOWN OUD, BROWN, BLUE HINOKI, SUNSHINE), Balsamic(UNKNOWN OUD), Amber(BROWN, BOTTARI)로 세분화. 우디는 가벼운 편백(BLUE HINOKI)부터 수지 같이 무거운 OUD(UNKNOWN OUD)까지 스펙트럼이 넓습니다.", "perfumes": [{"name": "BERGA SANDAL", "base": "BERGA SANDAL", "sub": "시트러스+우디 — 베르가못이 샌달우드 위에서 클래식하게 표현", "respond": [{"label": "장면 워딩", "text": "이른 아침 창문을 여는 것처럼 청명하게 시작해요. 시간이 지나면서 오래된 나무 책상의 크리미한 향으로 변하고, 마지막엔 오래 쓴 가죽 지갑 같은 묵직한 잔향으로 닫혀요.", "note": "→ 탑(아침 공기) → 하트(나무 책상) → 베이스(가죽 잔향) 3단 드라이다운 장면화"}, {"label": "전문 고객 워딩", "text": "베르가못 탑이 시트러스를 깔끔하게 열고, 마이소르 산지 특유의 크리미한 샌달우드가 하트에서 올라와요. 앰버 그리 베이스가 레지너스(resinous)한 잔향으로 마무리하는 클래식 시트러스-우디 구조예요.", "note": "→ 마이소르 샌달우드·앰버 그리·레지너스 전문 용어로 클래식 구조 설명"}], "plus": {"notes": [{"pos": "Top", "name": "베르가못", "everyday": "얼그레이 티를 따를 때 올라오는 싱그럽고 시트러스한 향"}, {"pos": "Heart", "name": "마이소르 샌달우드", "everyday": "오래된 한옥 마루에서 나는 부드럽고 크리미한 나무 향"}, {"pos": "Base", "name": "앰버 그리", "everyday": "오래된 가죽 지갑을 오래 써서 손때가 밴 따뜻하고 묵직한 잔향"}], "tip": "'마이소르(Mysore) 샌달우드는 인도 남부가 원산지로 가장 크리미하고 품질이 높아요' — 이 한 문장으로 BERGA SANDAL의 샌달우드가 왜 다른지 설명됩니다."}}, {"name": "UNKNOWN OUD", "base": "UNKNOWN OUD", "sub": "발사믹+우디 — 수지+아웃도어, 가장 깊고 무거운 계열", "respond": [{"label": "장면 워딩", "text": "깊은 숲 속 오래된 사원 근처를 지나는 것 같아요. 블랙 페퍼의 자극이 먼저 오다가, 침향 특유의 수지 같고 신비로운 무게감이 올라오고, 마지막엔 벤조인의 달콤하고 묵직한 여운으로 닫혀요.", "note": "→ 블랙페퍼·침향·벤조인을 '사원 주변 숲길' 하나의 장면으로 통합"}, {"label": "전문 고객 워딩", "text": "블랙 페퍼 탑이 스파이시하게 열리면서 아가우드 하트의 수지-동물성 노트를 더 선명하게 만들어요. 아가우드 특유의 페칼(fecal)한 동물성 뉘앙스가 벤조인의 발삼(balsam)한 달콤함으로 중화되는 구조예요. 탬버린즈에서 가장 동양적이고 수지 깊이가 강한 향이에요.", "note": "→ 페칼·발삼 전문 용어 + 동양적 수지 향의 구조를 정확히 설명"}], "plus": {"notes": [{"pos": "Top", "name": "블랙 페퍼", "everyday": "갓 간 통후추를 코 가까이 가져갔을 때의 자극적이고 스파이시한 향"}, {"pos": "Heart", "name": "아가우드(침향)", "everyday": "절에서 향을 피울 때 올라오는 연기 섞인 수지 향, 달콤하고 무겁고 신비로운"}, {"pos": "Base", "name": "벤조인", "everyday": "오래된 약국 나무 선반 위 연고 뚜껑을 열었을 때의 달콤하고 따뜻한 수지 향"}], "tip": "아가우드(침향)를 처음 접하는 고객에게는 '절에서 향 피울 때 그 무겁고 신비로운 향 아세요?'로 시작하세요. 거의 모든 사람이 공감합니다."}}, {"name": "BROWN", "base": "BROWN", "sub": "앰버+우디 — 따뜻하고 부드러운 앰버, 캐러멜 같은 우디 베이스", "respond": [{"label": "장면 워딩", "text": "겨울 저녁 따뜻한 카페에서 짜이를 마시며 나무 테이블에 앉아 있는 것 같아요. 스파이시하게 시작해서 건조한 나무 향을 지나, 쿠키 굽는 오븐 같은 달콤한 온기로 마무리돼요.", "note": "→ 카다몸·시더·앰버 바닐라를 '겨울 카페 짜이' 장면으로 통합"}, {"label": "전문 고객 워딩", "text": "카다몸 탑이 오리엔탈-스파이시 경계에서 향에 생기를 불어넣고, 시더우드 하트가 드라이하고 각진 우디로 중심을 잡아요. 앰버 바닐라 베이스가 구르망(gourmand) 계열 특유의 달콤하고 따뜻한 온기로 마무리하는 앰버-우디 구조예요.", "note": "→ 카다몸·구르망·오리엔탈 전문 용어로 BROWN의 복합 구조 설명"}], "plus": {"notes": [{"pos": "Top", "name": "카다몸", "everyday": "인도 짜이(chai)를 끓일 때 올라오는 달콤하고 스파이시한 향신료 향"}, {"pos": "Heart", "name": "시더우드", "everyday": "새 나무 연필을 깎을 때 나는 건조하고 깔끔한 나무 향"}, {"pos": "Base", "name": "앰버 바닐라", "everyday": "갓 구운 쿠키가 식으면서 오븐에 남아있는 달콤하고 따뜻한 잔향"}], "tip": "카다몸을 모르는 고객에게는 '짜이 마셔보셨어요? 그 향신료 중에 달콤하고 스파이시한 게 카다몸이에요'로 연결하세요."}}, {"name": "BLUE HINOKI", "base": "BLUE HINOKI", "sub": "우디+마린 — 편백나무, 가장 가벼운 그린-우디", "respond": [{"label": "장면 워딩", "text": "해안가 편백나무 숲에서 바닷바람이 불어오는 것 같아요. 유자의 청명함으로 시작해서 편백나무의 따뜻한 나무 결을 지나, 바닷바람이 피부에 닿고 마른 듯한 소금기 있는 잔향으로 마무리돼요.", "note": "→ 유자·편백·해양성 머스크를 '해안 편백 숲' 하나의 장면으로 통합"}, {"label": "전문 고객 워딩", "text": "유자 탑이 시트러스-플로럴 경계에서 동양적이고 청명하게 열리고, 히노키 하트가 세스퀴테르펜(sesquiterpene) 계열 특유의 따뜻하고 울창한 우디를 만들어요. 해양성 머스크 베이스가 아쿠아틱한 미네랄 잔향으로 마무리하는 우디-마린의 드문 조합이에요.", "note": "→ 세스퀴테르펜 향료 개념 + 우디-마린 드문 조합으로 전문 고객 관심 자극"}], "plus": {"notes": [{"pos": "Top", "name": "유자", "everyday": "유자차를 처음 마실 때 올라오는 한국적이고 청명한 시트러스-플로럴 향"}, {"pos": "Heart", "name": "편백(히노키)", "everyday": "찜질방 편백탕 옆 나무 바닥에서 나는 청명하고 따뜻한 나무 향"}, {"pos": "Base", "name": "해양성 머스크", "everyday": "바닷바람이 피부에 닿고 마른 후에 남아있는 소금기 있는 청명한 잔향"}], "tip": "'히노키(편백)는 찜질방 편백탕에서 맡던 그 향이에요' — 한국 고객이 즉각적으로 공감하는 연결고리입니다."}}, {"name": "BOTTARI", "base": "BOTTARI", "sub": "앰버+머스크 — 따뜻한 앰버가 머스크와 결합, 포근하고 관능적", "respond": [{"label": "장면 워딩", "text": "보자기에 꼭 싸서 품고 있는 것 같은 향이에요. 핑크 페퍼의 달콤한 자극으로 시작해서, 오리스 루트의 파우더리한 우아함을 지나, 캐시미어에 밴 향수처럼 따뜻하고 관능적인 잔향으로 닫혀요.", "note": "→ 이름(BOTTARI·보따리)의 '품는다'는 의미를 드라이다운 흐름으로 연결"}, {"label": "전문 고객 워딩", "text": "핑크 페퍼 탑이 스파이시-플로럴 경계에서 향에 생동감을 주고, 오리스 루트 하트가 아이리스의 차갑고 파우더리한 우아함으로 중심을 잡아요. 앰버 우드 머스크 베이스가 오리엔탈-앰버 계열 특유의 관능적이고 따뜻한 잔향으로 길게 이어져요.", "note": "→ 핑크 페퍼·오리스 루트 향료명 + 오리엔탈-앰버 계열로 정확한 분류 제공"}], "plus": {"notes": [{"pos": "Top", "name": "핑크 페퍼", "everyday": "갓 간 핑크 페퍼콘의 달콤하고 스파이시한, 약간 장미 같기도 한 향"}, {"pos": "Heart", "name": "오리스 루트", "everyday": "오래된 파우더 콤팩트를 열었을 때 올라오는 차갑고 파우더리한 아이리스 향"}, {"pos": "Base", "name": "앰버 우드 머스크", "everyday": "캐시미어 스웨터에 오래된 오드퍼퓸이 밴 것 같은 따뜻하고 관능적인 잔향"}], "tip": "오리스 루트는 아이리스 뿌리에서 추출하는 향수에서 가장 비싼 향료 중 하나예요 — 이 한 문장이 BOTTARI의 고급감을 즉각적으로 전달합니다."}}, {"name": "SUNSHINE", "base": "SUNSHINE", "sub": "플로럴+우디+머스크 — 플로럴을 우디가 잡아주는 지속형 구조", "respond": [], "plus": {"notes": [], "tip": ""}}], "approach": [{"title": "무게감 스펙트럼 안내", "text": "우디 계열 안에서도 가벼운 순서로 안내: BLUE HINOKI(그린-우디) → BERGA SANDAL(시트러스-우디) → BROWN(앰버-우디) → UNKNOWN OUD(발사믹-우디) 순으로 스펙트럼 제시."}, {"title": "감각 표현법", "text": "'나무 향이에요'보다 '비 오기 직전 마른 땅', '오래된 서재 나무 책장', '깊은 숲 속 이른 아침 안개 사이 나무', '캐러멜을 입힌 나무 내부' 같은 장면으로."}], "scripts": [{"who": "고객", "line": "우디한 향 찾는데 얼마나 다양한지 모르겠어요."}, {"who": "직원", "line": "우디 계열이 탬버린즈 안에서 굉장히 다양하거든요. 제일 가벼운 건 BLUE HINOKI인데 편백나무 기반이라 그린이랑 우디가 섞여서 삼림욕 같은 느낌이고요, 좀 더 클래식하게 우디를 원하시면 BERGA SANDAL이 베르가못+샌달우드 조합이에요. 묵직하고 깊게 가고 싶다면 UNKNOWN OUD가 수지+우디라서 가장 강한 인상을 줘요. 어떤 방향이 더 맞으세요?", "note": "→ 가벼운 → 무거운 스펙트럼으로 3단계 안내"}, {"who": "직원 (UNKNOWN OUD 전문 고객에게)", "line": "UNKNOWN OUD는 발사믹 계열이 베이스에 있어서 드라이다운이 굉장히 수지 같고 깊어요. 이 쪽 계열 좋아하시는 분들은 한번 경험하면 계속 찾으시더라고요.", "note": "→ 발사믹 용어 자연스럽게 사용, 전문 고객 신뢰 획득"}], "upsell": ["BERGA SANDAL → 재방문 고객에게 UNKNOWN OUD로 더 깊은 우디 경험 제안", "BROWN → 앰버+우디 좋아하는 고객에게 BOTTARI로 머스크 레이어 추가 제안"], "caution": {"no": "'남성분들이 많이 찾는 향이에요'", "yes": "'절제되고 묵직한 감도를 좋아하시는 분들한테 잘 맞는 계열이에요'"}}, {"id": "musk", "   let h=`<div class="detail"><h2>${esc(p.name)}</h2>${p.sub?`<div class="sub">${esc(p.sub)}</div>`:''}`;
  const kws=kwFor(p);
  h+=`<div class="dsec"><h3>향 키워드 <span style="color:#c9c0b2">· 향 맵 연동</span></h3><div class="chips">${kws.length?kws.map(k=>`<span class="chip kw">${esc(k)}</span>`).join(''):'<span style="font-size:12px;color:#b3a892">향 맵에 등록된 키워드가 없습니다</span>'}</div></div>`;
  if(p.respond&&p.respond.length)h+=`<div class="dsec"><h3>향수별 향료 응대 워딩</h3>${p.respond.map(w=>`<div class="word"><div class="wl">${esc(w.label)}</div><div class="wt">${esc(w.text)}</div>${w.note?`<div class="wn">${esc(w.note)}</div>`:''}</div>`).join('')}</div>`;
  const pl=p.plus||{notes:[],tip:''};
  if((pl.notes&&pl.notes.length)||pl.tip){h+=`<div class="dsec"><h3>향료 플러스 워딩</h3>`;h+=(pl.notes||[]).map(n=>`<div class="note"><div class="np">${esc(n.pos)}</div><div><div class="nm">${esc(n.name)}</div><div class="ne">${esc(n.everyday)}</div></div></div>`).join('');if(pl.tip)h+=`<div class="tip"><b>TIP</b>${esc(pl.tip)}</div>`;h+=`</div>`;}
  h+=`</div>`;return h;
}
function accordGuideView(a){
  let g='';
  if(a.approach&&a.approach.length)g+=`<div class="dsec"><h3>어프로치 & 감각 표현법</h3>${a.approach.map(x=>`<div class="acard"><div class="at">${esc(x.title)}</div><div class="ax">${esc(x.text)}</div></div>`).join('')}</div>`;
  if(a.scripts&&a.scripts.length)g+=`<div class="dsec"><h3>실전 응대 스크립트</h3>${a.scripts.map(s=>`<div class="script" style="border-left:3px solid ${a.c.tabtx}"><div class="who" style="color:${a.c.tx}">${esc(s.who)}</div><div class="line">${esc(s.line)}</div>${s.note?`<div class="snote">${esc(s.note)}</div>`:''}</div>`).join('')}</div>`;
  if(a.upsell&&a.upsell.length)g+=`<div class="dsec"><h3>연계 추천</h3>${a.upsell.map(u=>`<div class="us">${esc(u)}</div>`).join('')}</div>`;
  if(a.caution&&(a.caution.no||a.caution.yes))g+=`<div class="dsec"><h3>표현 주의</h3><div class="caut"><div class="box no"><b>지양</b>${esc(a.caution.no)}</div><div class="box yes"><b>권장</b>${esc(a.caution.yes)}</div></div></div>`;
  return g?`<div class="gbox"><div class="gt">${esc(a.en)} 계열 응대 가이드</div>${g}</div>`:'';
}
function detailEdit(a,p){
  let h=actions()+`<div class="detail">`;
  h+=`<div class="el">향수명</div><input class="edi" id="e_name" value="${esc2(p.name)}">`;
  h+=`<div class="el">한 줄 설명</div><input class="edi" id="e_sub" value="${esc2(p.sub||'')}">`;
  h+=`<div class="el">향 키워드는 향 맵에서 관리됩니다 (여기선 표시만)</div>`;
  h+=`<div class="el">향수별 향료 응대 워딩</div><div id="e_resp">`+
    (p.respond||[]).map((w,i)=>`<div class="edrow"><div><input class="edi" data-rl="${i}" value="${esc2(w.label)}" placeholder="라벨(예: 장면 워딩)"><textarea class="edt" data-rt="${i}" style="margin-top:5px" placeholder="워딩">${esc2(w.text)}</textarea><input class="edi" data-rn="${i}" style="margin-top:5px" value="${esc2(w.note||'')}" placeholder="메모(선택)"></div><button class="rm" data-rmr="${i}">삭제</button></div>`).join('')+
    `</div><button class="add" id="addResp">＋ 응대 워딩 추가</button>`;
  h+=`<div class="el">향료 플러스 워딩 — 노트</div><div id="e_notes">`+
    ((p.plus&&p.plus.notes)||[]).map((n,i)=>`<div class="edrow"><div><input class="edi" data-npos="${i}" value="${esc2(n.pos)}" placeholder="Top/Heart/Base"><input class="edi" data-nnm="${i}" style="margin-top:5px" value="${esc2(n.name)}" placeholder="향료명"><textarea class="edt" data-nev="${i}" style="margin-top:5px" placeholder="일상 향료 연결 설명">${esc2(n.everyday)}</textarea></div><button class="rm" data-rmn="${i}">삭제</button></div>`).join('')+
    `</div><button class="add" id="addNote">＋ 노트 추가</button>`;
  h+=`<div class="el">TIP</div><textarea class="edt" id="e_tip">${esc2((p.plus&&p.plus.tip)||'')}</textarea>`;
  h+=`</div>`;
  // accord-level edit
  h+=`<div class="gbox"><div class="gt">${esc(a.en)} 계열 응대 가이드 (편집)</div>`;
  h+=`<div class="el">어프로치 & 감각 표현법</div><div id="e_ap">`+
    (a.approach||[]).map((x,i)=>`<div class="edrow"><div><input class="edi" data-apt="${i}" value="${esc2(x.title)}" placeholder="제목"><textarea class="edt" data-apx="${i}" style="margin-top:5px" placeholder="내용">${esc2(x.text)}</textarea></div><button class="rm" data-rmap="${i}">삭제</button></div>`).join('')+
    `</div><button class="add" id="addAp">＋ 어프로치 추가</button>`;
  h+=`<div class="el">실전 응대 스크립트</div><div id="e_sc">`+
    (a.scripts||[]).map((s,i)=>`<div class="edrow"><div><input class="edi" data-scw="${i}" value="${esc2(s.who)}" placeholder="화자(고객/직원)"><textarea class="edt" data-scl="${i}" style="margin-top:5px" placeholder="대사">${esc2(s.line)}</textarea><input class="edi" data-scn="${i}" style="margin-top:5px" value="${esc2(s.note||'')}" placeholder="메모(선택)"></div><button class="rm" data-rmsc="${i}">삭제</button></div>`).join('')+
    `</div><button class="add" id="addSc">＋ 스크립트 추가</button>`;
  h+=`<div class="el">연계 추천 (한 줄씩)</div><div id="e_us">`+
    (a.upsell||[]).map((u,i)=>`<div class="edrow"><div><input class="edi" data-us="${i}" value="${esc2(u)}"></div><button class="rm" data-rmus="${i}">삭제</button></div>`).join('')+
    `</div><button class="add" id="addUs">＋ 연계 추천 추가</button>`;
  h+=`<div class="el">표현 주의 — 지양</div><input class="edi" id="e_cno" value="${esc2(a.caution&&a.caution.no||'')}">`;
  h+=`<div class="el">표현 주의 — 권장</div><input class="edi" id="e_cyes" value="${esc2(a.caution&&a.caution.yes||'')}">`;
  h+=`</div>`+actions();return h;
}
function render(){
  tabsRender();const a=GDATA[cur];if(sel>=a.perfumes.length)sel=0;
  let h=`<div class="adesc" style="background:${a.c.bg};border:1px solid ${a.c.bd};color:${a.c.ds}">${esc(a.desc)}</div>`;
  const p=a.perfumes[sel];
  if(EDIT){ h+=pfList(a); if(p)h+=detailEdit(a,p); }
  else { h+=accordGuideView(a); h+=`<div class="pfhd">향수별 상세 · 향수를 선택하세요</div>`; h+=pfList(a); if(p)h+=detailView(a,p); }
  $('panel').innerHTML=h;bind(a);window.scrollTo({top:0,behavior:'instant'});
}
function readEdit(){const a=GDATA[cur],p=a.perfumes[sel];if(!$('e_name'))return;
  if(p){p.name=$('e_name').value.trim()||p.name;p.base=p.name.replace(/\s*\(.*$/,'').trim().toUpperCase();p.sub=$('e_sub').value;
    p.respond=[...document.querySelectorAll('#e_resp .edrow')].map(r=>({label:r.querySelector('[data-rl]').value,text:r.querySelector('[data-rt]').value,note:r.querySelector('[data-rn]').value})).filter(w=>w.text||w.label);
    const notes=[...document.querySelectorAll('#e_notes .edrow')].map(r=>({pos:r.querySelector('[data-npos]').value,name:r.querySelector('[data-nnm]').value,everyday:r.querySelector('[data-nev]').value})).filter(n=>n.name||n.everyday);
    p.plus={notes:notes,tip:$('e_tip').value};}
  a.approach=[...document.querySelectorAll('#e_ap .edrow')].map(r=>({title:r.querySelector('[data-apt]').value,text:r.querySelector('[data-apx]').value})).filter(x=>x.title||x.text);
  a.scripts=[...document.querySelectorAll('#e_sc .edrow')].map(r=>({who:r.querySelector('[data-scw]').value,line:r.querySelector('[data-scl]').value,note:r.querySelector('[data-scn]').value})).filter(s=>s.who||s.line);
  a.upsell=[...document.querySelectorAll('#e_us .edrow')].map(r=>r.querySelector('[data-us]').value).filter(Boolean);
  a.caution={no:$('e_cno').value,yes:$('e_cyes').value};
}
function bind(a){
  document.querySelectorAll('[data-pf]').forEach(b=>b.onclick=()=>{if(EDIT)readEdit();sel=+b.dataset.pf;render();});
  if(EDIT){
    const g=(id,fn)=>{const e=$(id);if(e)e.onclick=fn;};
    g('addPf',()=>{readEdit();a.perfumes.push({name:'새 향수',base:'',sub:'',respond:[],plus:{notes:[],tip:''}});sel=a.perfumes.length-1;render();});
    g('addResp',()=>{readEdit();a.perfumes[sel].respond.push({label:'',text:'',note:''});render();});
    g('addNote',()=>{readEdit();a.perfumes[sel].plus.notes.push({pos:'',name:'',everyday:''});render();});
    g('addAp',()=>{readEdit();a.approach.push({title:'',text:''});render();});
    g('addSc',()=>{readEdit();a.scripts.push({who:'직원',line:'',note:''});render();});
    g('addUs',()=>{readEdit();a.upsell.push('');render();});
    document.querySelectorAll('[data-rmr]').forEach(b=>b.onclick=()=>{readEdit();a.perfumes[sel].respond.splice(+b.dataset.rmr,1);render();});
    document.querySelectorAll('[data-rmn]').forEach(b=>b.onclick=()=>{readEdit();a.perfumes[sel].plus.notes.splice(+b.dataset.rmn,1);render();});
    document.querySelectorAll('[data-rmap]').forEach(b=>b.onclick=()=>{readEdit();a.approach.splice(+b.dataset.rmap,1);render();});
    document.querySelectorAll('[data-rmsc]').forEach(b=>b.onclick=()=>{readEdit();a.scripts.splice(+b.dataset.rmsc,1);render();});
    document.querySelectorAll('[data-rmus]').forEach(b=>b.onclick=()=>{readEdit();a.upsell.splice(+b.dataset.rmus,1);render();});
    document.querySelectorAll('[data-act=apply]').forEach(b=>b.onclick=()=>{readEdit();render();fbSave(true);});
    document.querySelectorAll('[data-act=save]').forEach(b=>b.onclick=()=>fbSave(false));
  }
}
function fbSave(silent){if(!fbRef){if(!silent)alert('저장이 준비되지 않았습니다.');return;}if(EDIT)readEdit();
  document.querySelectorAll('[data-act=save]').forEach(b=>b.textContent='저장 중…');
  fbRef.set({gdata:GDATA,ts:Date.now()}).then(()=>{document.querySelectorAll('[data-act=save]').forEach(b=>{b.textContent='✓ 저장됨';setTimeout(()=>b.textContent='☁ 모두에게 저장',1500);});if(!silent)alert('저장됐습니다! 링크로 들어오는 누구나 바로 볼 수 있어요.');}).catch(e=>{if(!silent)alert('저장 실패: '+e.message);});}
$('editBtn').onclick=()=>{if(EDIT){readEdit();EDIT=false;$('editBtn').textContent='✎ 편집';render();return;}const v=prompt('편집 비밀번호를 입력하세요');if(v===PASS){EDIT=true;$('editBtn').textContent='✓ 편집 종료';render();}else if(v!==null)alert('비밀번호가 올바르지 않습니다.');};
function loadKW(cb){firebase.database().ref('tamburins/overrides/scentKw').once('value').then(s=>{const v=s.val()||{};Object.keys(v).forEach(k=>{const arr=(v[k]||[]).map(o=>o&&o.t?o.t:o).filter(Boolean);if(arr.length)KW[k.toUpperCase()]=arr;});cb();}).catch(cb);}
function applyParam(){const q=new URLSearchParams(location.search).get('p');if(!q)return;const t=q.toUpperCase();for(let i=0;i<GDATA.length;i++){const j=GDATA[i].perfumes.findIndex(p=>((p.base||p.name||'').toUpperCase())===t);if(j>=0){cur=i;sel=j;return;}}}
function init(){try{firebase.initializeApp(FB);fbRef=firebase.database().ref('tamburins/accordGuide');
  fbRef.once('value').then(s=>{const v=s&&s.val?s.val():null;if(v&&v.gdata&&v.gdata.length){const byId={};v.gdata.forEach(a=>byId[a.id]=a);GDATA=GDATA.map(base=>{const fb=byId[base.id];if(!fb)return base;return Object.assign({},base,fb,{approach:(fb.approach&&fb.approach.length)?fb.approach:base.approach,scripts:(fb.scripts&&fb.scripts.length)?fb.scripts:base.scripts,upsell:(fb.upsell&&fb.upsell.length)?fb.upsell:base.upsell,caution:(fb.caution&&(fb.caution.no||fb.caution.yes))?fb.caution:base.caution});});}loadKW(()=>{applyParam();render();});}).catch(()=>loadKW(()=>{applyParam();render();}));
}catch(e){render();}}
init();
</script></body></html>
