<div class="hero"><h1 class="ttl">Accord 연구하기</h1><p>향과 어코드를 더 깊이 있게 공부하는 공간입니다.</p></div>
<div class="tabs" id="tabs"></div>
<div id="panels"></div>
<script>
const TABS=[
 {label:'어코드 가이드 · 향료 플러스 워딩', en:'Accord Guide · Note Plus Wording',
   items:[{h:'어코드별 가이드',en:'ACCORD GUIDE',src:'./accord-guide.html'},
          {h:'향료 플러스 워딩',en:'NOTE PLUS WORDING',src:'./expert-wording.html'}]},
 {label:'계절·날씨', en:'Season & Weather', items:[{h:'',en:'',src:'./season-weather.html'}]},
];
const tabsEl=document.getElementById('tabs'), panelsEl=document.getElementById('panels');
function fit(fr){try{const d=fr.contentDocument;if(d&&d.body){fr.style.height=(Math.max(d.body.scrollHeight,d.documentElement.scrollHeight)+8)+'px';}}catch(e){}}
const panels=[];
TABS.forEach((t,i)=>{
  const b=document.createElement('button');b.innerHTML=t.label+'<span class="en">'+t.en+'</span>';b.onclick=()=>sel(i);tabsEl.appendChild(b);
  const pan=document.createElement('div');pan.className='panel';
  t.items.forEach(it=>{
    if(it.h){const hd=document.createElement('div');hd.className='subhd';hd.innerHTML='<span class="k">'+it.h+'</span><span class="e">'+it.en+'</span>';pan.appendChild(hd);}
    const w=document.createElement('div');w.className='frameWrap';
    const fr=document.createElement('iframe');fr.className='study';fr.title=it.h||'Accord';fr.dataset.src=it.src;
    fr.addEventListener('load',()=>{fit(fr);try{new ResizeObserver(()=>fit(fr)).observe(fr.contentDocument.body);}catch(e){}});
    w.appendChild(fr);pan.appendChild(w);
  });
  panelsEl.appendChild(pan);panels.push(pan);
});
function sel(i){
  [...tabsEl.children].forEach((b,k)=>b.classList.toggle('on',k===i));
  panels.forEach((p,k)=>p.classList.toggle('on',k===i));
  panels[i].querySelectorAll('iframe.study').forEach(fr=>{if(!fr.src&&fr.dataset.src)fr.src=fr.dataset.src;});
  window.scrollTo({top:0,behavior:'instant'});
}
setInterval(()=>{document.querySelectorAll('.panel.on iframe.study').forEach(fit);},800);
sel(0);
</script>
</body></html>
